name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install ruff
      - name: Ruff (backend + gateway)
        run: ruff check backend/src gateway/src

  test-backend:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        # ADR 0004: la lógica debe funcionar en ambos motores
        database:
          - "sqlite+aiosqlite:///./test.db"
          - "postgresql+asyncpg://noc:noc@localhost:5432/noc_test"
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: noc
          POSTGRES_PASSWORD: noc
          POSTGRES_DB: noc_test
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U noc"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -e "backend[dev]"
      - name: Pytest backend
        env:
          NOC_TEST_DATABASE_URL: ${{ matrix.database }}
        run: pytest backend/tests -v

  test-gateway-and-contract:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -e "gateway[dev]"
      - name: Pytest gateway (incluye validación del contrato de eventos)
        run: pytest gateway/tests -v

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - run: npm install
        working-directory: frontend
      - name: Typecheck + build
        run: npm run build
        working-directory: frontend

  docker-multiarch:
    runs-on: ubuntu-latest
    needs: [lint, test-backend, test-gateway-and-contract, frontend]
    strategy:
      matrix:
        service: [backend, gateway, frontend]
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - name: Build ${{ matrix.service }} (amd64 + arm64)
        uses: docker/build-push-action@v6
        with:
          context: ./${{ matrix.service }}
          platforms: linux/amd64,linux/arm64
          push: false
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}
