# Desarrollo: docker compose -f docker-compose.yml -f docker-compose.dev.yml up
#
# Los puertos de infraestructura (BD, Redis, API directa) se ligan a
# 127.0.0.1: son comodidades de desarrollo, no servicios para la LAN. La API
# directa además confía en X-Real-IP (rate limit de login / login-log), que
# solo es fiable cuando la fija el nginx de delante — expuesta a la red, la
# cabecera sería falsificable. La UI de dev (:5173) sí queda abierta: su
# proxy de Vite reenvía /api por el lado servidor.
services:
  postgres:
    ports:
      - "127.0.0.1:5432:5432"

  redis:
    ports:
      - "127.0.0.1:6379:6379"

  backend:
    build:
      context: ./backend
    command: ["uvicorn", "noc.main:app", "--host", "0.0.0.0", "--port", "8000", "--reload"]
    environment:
      NOC_ENVIRONMENT: development
      NOC_LOG_LEVEL: DEBUG
    volumes:
      - ./backend/src:/app/src
      - ./backend/alembic:/app/alembic
    ports:
      - "127.0.0.1:8000:8000"

  gateway:
    environment:
      GATEWAY_LOG_LEVEL: DEBUG
    volumes:
      - ./gateway/src:/app/src

  frontend:
    image: node:22-alpine
    build: !reset null
    working_dir: /app
    command: ["sh", "-c", "npm install && npm run dev"]
    volumes:
      - ./frontend:/app
    ports:
      - "5173:5173"
