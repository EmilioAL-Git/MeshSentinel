name: meshtastic-noc

services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-noc}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-noc}
      POSTGRES_DB: ${POSTGRES_DB:-noc}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-noc} -d ${POSTGRES_DB:-noc}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      args:
        GIT_COMMIT: ${GIT_COMMIT:-unknown}
        BUILD_TIME: ${BUILD_TIME:-unknown}
    environment:
      NOC_DATABASE_URL: ${NOC_DATABASE_URL:-postgresql+asyncpg://noc:noc@postgres:5432/noc}
      NOC_REDIS_URL: redis://redis:6379/0
      NOC_LOG_LEVEL: ${NOC_LOG_LEVEL:-INFO}
      LOW_BATTERY_THRESHOLD: ${LOW_BATTERY_THRESHOLD:-20}
      OFFLINE_MINUTES_WARNING: ${OFFLINE_MINUTES_WARNING:-30}
      OFFLINE_PERCENT_WARNING: ${OFFLINE_PERCENT_WARNING:-5}
      OFFLINE_PERCENT_CRITICAL: ${OFFLINE_PERCENT_CRITICAL:-20}
      SNR_DEGRADED_THRESHOLD: ${SNR_DEGRADED_THRESHOLD:--15}
      NOC_ADMIN_RATE_LIMIT_PER_MINUTE: ${NOC_ADMIN_RATE_LIMIT_PER_MINUTE:-60}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  gateway:
    build: ./gateway
    environment:
      GATEWAY_ID: ${GATEWAY_ID:-gw-01}
      GATEWAY_TRANSPORT: ${GATEWAY_TRANSPORT:-simulated}
      MESHTASTIC_USB_DEVICE: ${MESHTASTIC_USB_DEVICE:-}
      MESHTASTIC_RECONNECT_INITIAL_DELAY: ${MESHTASTIC_RECONNECT_INITIAL_DELAY:-5}
      MESHTASTIC_RECONNECT_MAX_DELAY: ${MESHTASTIC_RECONNECT_MAX_DELAY:-300}
      GATEWAY_TCP_HOST: ${GATEWAY_TCP_HOST:-}
      GATEWAY_TCP_PORT: ${GATEWAY_TCP_PORT:-4403}
      GATEWAY_SIM_SEED: ${GATEWAY_SIM_SEED:-42}
      GATEWAY_SIM_SHARED_SEED: ${GATEWAY_SIM_SHARED_SEED:-0}
      GATEWAY_SIM_SHARED_NODE_COUNT: ${GATEWAY_SIM_SHARED_NODE_COUNT:-4}
      GATEWAY_REDIS_URL: redis://redis:6379/0
      GATEWAY_LOG_LEVEL: ${NOC_LOG_LEVEL:-INFO}
    depends_on:
      redis:
        condition: service_healthy
    # Para GATEWAY_TRANSPORT=usb, descomentar y ajustar al dispositivo real
    # (ver docs/operations/usb.md y docs/acceptance/usb.md). No usar
    # privileged: true — mapear el dispositivo concreto es suficiente.
    # devices:
    #   - "/dev/ttyACM0:/dev/ttyACM0"
    restart: unless-stopped

  # Segunda pasarela simulada para validar Multi-Gateway (M6.2): semilla
  # exclusiva distinta + la MISMA semilla compartida => nodos SHRxx idénticos
  # oídos por ambas pasarelas. Descomentar para levantarla:
  # gateway-2:
  #   build: ./gateway
  #   environment:
  #     GATEWAY_ID: gw-02
  #     GATEWAY_TRANSPORT: simulated
  #     GATEWAY_SIM_SEED: 1042
  #     GATEWAY_SIM_SHARED_SEED: ${GATEWAY_SIM_SHARED_SEED:-7}
  #     GATEWAY_SIM_SHARED_NODE_COUNT: ${GATEWAY_SIM_SHARED_NODE_COUNT:-4}
  #     GATEWAY_REDIS_URL: redis://redis:6379/0
  #     GATEWAY_LOG_LEVEL: ${NOC_LOG_LEVEL:-INFO}
  #   depends_on:
  #     redis:
  #       condition: service_healthy
  #   restart: unless-stopped

  frontend:
    build: ./frontend
    ports:
      - "${NOC_HTTP_PORT:-8080}:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  postgres-data:
  redis-data:
